; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32@6.12.0
framework = arduino
monitor_speed = 115200
build_unflags =
    -std=gnu++11
check_flags = 
	cppcheck: --enable=all --inline-suppr --suppress=*:*/.pio/*
monitor_filters =
    esp32_exception_decoder
    time
    default

[display_common]
build_flags =
    -std=c++17
    -std=gnu++17
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -DLV_CONF_SUPPRESS_DEFINE_CHECK
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_MBEDTLS_CERTIFICATE_BUNDLE_DEFAULT_CMN
    -Os
    -DCONFIG_MAX_FILENAME_LEN=64
    -DCONFIG_MAX_URL_LEN=128
    -DCONFIG_NIMBLE_CPP_LOG_LEVEL=2
    -DCONFIG_BT_NIMBLE_PINNED_TO_CORE=0
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    -DCONFIG_ASYNC_TCP_MAX_ACK_TIME=5000
    -DCONFIG_ASYNC_TCP_PRIORITY=10
    -DCONFIG_ASYNC_TCP_QUEUE_SIZE=64
    -DCONFIG_ASYNC_TCP_STACK_SIZE=8192
    -DDEFAULT_MAX_WS_CLIENTS=4
lib_deps_default =
    FS
    SPIFFS
    Wire
    SPI
    ble_ota_dfu
    h2zero/NimBLE-Arduino@^1.4.0
    https://github.com/ESP32Async/ESPAsyncWebServer.git#v3.9.1
    bblanchon/ArduinoJson@^7.2.1
    256dpi/MQTT@^2.5.2
    https://github.com/gaggimate/esp-arduino-ble-scales
    homespan/HomeSpan@1.9.1

[env:display]
board = LilyGo-T-RGB
upload_speed = 921600
build_src_filter = -<*> +<display/> +<version.h>
extra_scripts =
	pre:scripts/auto_firmware_version.py
lib_deps =
    ${display_common.lib_deps_default}
    lewisxhe/SensorLib @ 0.2.3
    bodmer/TFT_eSPI @ 2.5.43
	lvgl/lvgl @ 8.4.0
	moononournation/GFX Library for Arduino @ 1.5.9
build_flags =
    ${display_common.build_flags}
    -DFORCE_LILYGO_DRIVER

[env:display-headless]
extends = env:display
lib_deps =
    ${display_common.lib_deps_default}
build_flags =
    ${display_common.build_flags}
    -DGAGGIMATE_HEADLESS
build_src_filter = -<*> +<display/> +<version.h> -<display/drivers/> -<display/ui/> -<display/lv_conf.h>

[env:display-headless-8m]
extends = env:display-headless
board = seeed_xiao_esp32s3

[env:display-headless-4m]
extends = env:display-headless
board = esp32-s3-supermini

[env:elecrow_rotary_21]
platform = espressif32 @ 6.5.0
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 115200
monitor_dtr = 0
monitor_rts = 0
monitor_filters =
    time
    default
upload_flags =
    --before
    default_reset
    --no-stub
    --after
    hard_reset
extra_scripts =
    pre:scripts/pio_force_single_job.py
board_build.partitions = default_16MB.csv
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.flash_mode = qio
; This is the "secret sauce" for Elecrow OPI PSRAM
board_build.arduino.memory_type = qio_opi
board_build.psram = esp_psram
build_unflags = -std=gnu++11
build_src_filter = 
    +<*> 
    -<controller/main.cpp>
    -<display/drivers/AmoledDisplay*>
    -<display/drivers/LilyGo*>
    -<display/drivers/AmoledDisplayDriver.cpp>
    -<display/drivers/LilyGoDriver.cpp>
    -<controller/>
build_flags = 
    ${display_common.build_flags}
    -std=gnu++17 
    ; Required for Elecrow driver/pin path selection in display init
    -D ELECROW_ROTARY_21
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -D ARDUINO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -I include
    -I src/display
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
lib_deps = 
    ${display_common.lib_deps_default}
    lewisxhe/SensorLib @ 0.2.3
    adafruit/Adafruit PCF8574 @ ^1.1.1
    moononournation/GFX Library for Arduino @ 1.4.0
    lvgl/lvgl @ ~8.3.11