name: Deploy Gaggimate
on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Kills those warnings
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build Firmware
        run: pio run -e display

      - name: Verify and Move Firmware
        run: |
          mkdir -p docs
          if [ -f .pio/build/display/firmware.bin ]; then
            cp .pio/build/display/firmware.bin docs/firmware.bin
            echo "Firmware successfully moved to docs/"
          else
            echo "Error: Firmware file not found!"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "Dule Rabbit Bot"
          git config --global user.email "action@github.com"
          git add docs/firmware.bin
          # This line prevents crashing if the file didn't change
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update firmware" && git push)
