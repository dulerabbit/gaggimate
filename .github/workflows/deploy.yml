name: Deploy Gaggimate

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.TEBI_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TEBI_SECRET_KEY }}
      TEBI_BUCKET: ${{ secrets.TEBI_BUCKET }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - name: Cache PlatformIO
        uses: actions/cache@v4.2.1
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install --upgrade platformio awscli

      - name: Build firmware
        run: pio run -e display

      - name: Verify Tebi credentials
        run: echo "Target Bucket ${TEBI_BUCKET}"

      - name: Upload firmware to Tebi
        run: |
          aws s3 cp .pio/build/display/firmware.bin s3://$TEBI_BUCKET/gaggimate-latest.bin \
            --endpoint-url https://s3.tebi.io --no-verify-ssl --addressing-style path --region us-east-1
